models:
- name: stg_products
  config:
    freshness:
      build_after:
        count: 6
        period: hour
        updates_on: all
  description: Product (food and drink items that can be ordered) data with basic cleaning and transformation applied, 
    one row per product.
  columns:
  - name: product_id
    description: The unique key for each product.
    data_tests:
    - not_null
    - unique
